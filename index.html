<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HumanCraft Pro | Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root { 
            --primary: #6366f1; 
            --accent: #f59e0b;
            --bg-light: #f8fafc;
            --bg-dark: #020617;
        }

        body { 
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none; 
            overscroll-behavior: none; 
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
        }

        .board-grid { 
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px); 
            background-size: 50px 50px; 
            transition: background-color 0.5s ease;
        }
        .theme-dark .board-grid { 
            background-image: radial-gradient(#334155 1.5px, transparent 1.5px); 
            background-color: var(--bg-dark); 
        }

        .item-card { 
            will-change: transform; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            z-index: 10;
            min-width: 160px;
        }
        .item-card:active { transform: scale(1.05) rotate(2deg); cursor: grabbing; }

        /* Shared styles for Rarity containers */
        .rarity-container { position: relative; overflow: hidden; border-width: 2px; }

        /* Rarity Styles */
        .rarity-normal { background: white; border-color: #e2e8f0; color: #1e293b; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        .rarity-gold {
            background: linear-gradient(135deg, #fbdf7e 0%, #f59e0b 50%, #d97706 100%);
            border-color: #92400e; color: #451a03;
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.3);
        }
        .rarity-gold::after {
            content: ""; position: absolute; top: 0; left: 0; width: 60%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.6), transparent);
            animation: shine 3s infinite linear; pointer-events: none;
        }

        .rarity-diamond {
            background: linear-gradient(135deg, #f0f9ff 0%, #7dd3fc 50%, #0284c7 100%);
            border-color: #075985; color: #0c4a6e;
            box-shadow: 0 10px 15px -3px rgba(125, 211, 252, 0.3);
        }

        .rarity-void {
            background: #000; border-color: #4338ca; color: #fff;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
            animation: pulse-void 2s infinite ease-in-out;
        }

        /* BROWN RARITY */
        .rarity-brown {
            background: #5d4037; border-color: #3e2723; color: #efebe9;
            box-shadow: 0 10px 15px -3px rgba(93, 64, 55, 0.4);
        }
        .brown-asset {
            width: 36px; height: 36px;
            animation: head-sway 3.5s ease-in-out infinite alternate;
            position: absolute; z-index: 5; top: 50%; margin-top: -18px;
        }
        .brown-asset-left { left: 8px; animation-delay: -1s; }
        .brown-asset-right { right: 8px; animation-delay: -2s; }

        @keyframes head-sway {
            from { transform: rotate(-12deg) scale(0.95); }
            to { transform: rotate(12deg) scale(1.05); }
        }

        /* VERIFIED RARITY */
        .rarity-verified {
            background: #ffffff; border-color: #0ea5e9; color: #0369a1;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.2);
        }
        .verified-container {
            position: absolute; inset: -150%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center; gap: 15px;
            transform: rotate(-45deg); animation: verified-slide 8s linear infinite; opacity: 0.2;
        }
        .verified-row { display: flex; gap: 15px; white-space: nowrap; }
        .verified-icon-small { width: 22px; height: 22px; }

        @keyframes verified-slide {
            from { transform: rotate(-45deg) translateY(0); }
            to { transform: rotate(-45deg) translateY(60px); }
        }

        /* FOOD RARITY */
        .rarity-food { background: #fff7ed; border-color: #ea580c; color: #9a3412; }
        .food-pattern {
            position: absolute; inset: 0; opacity: 0.1; font-size: 12px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
            animation: food-drift 10s linear infinite;
        }
        @keyframes food-drift {
            0% { transform: translateY(0); }
            100% { transform: translateY(-20px); }
        }

        /* 67 RARITY */
        .rarity-67 { background: #111; border-color: #676767; color: #fff; }
        .bg-67 {
            position: absolute; inset: 0; opacity: 0.3;
            background-image: url('https://media1.tenor.com/m/Lnt2uEm1vrUAAAAd/67-67-kid.gif');
            background-size: cover; background-position: center;
        }

        /* NEW: DUMB RARITY */
        .rarity-dumb { background: #331a00; border-color: #ff9900; color: #fff; }
        .bg-dumb {
            position: absolute; inset: 0; opacity: 0.4;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4JLdtxTMz3UEFwXeuJOflT3A7dPaL01uoCg&s');
            background-size: cover; background-position: center;
        }

        @keyframes pulse-void {
            0%, 100% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.8); }
        }

        @keyframes shine {
            0% { transform: translateX(-200%) skewX(-30deg); }
            100% { transform: translateX(300%) skewX(-30deg); }
        }

        .tab-active { background: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); color: #6366f1; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        #discoveryOverlay.active { opacity: 1; pointer-events: auto; }
        #discoveryBox.active { transform: scale(1); }

        .shop-card { background: white; border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .shop-card:hover { transform: translateY(-4px); border-color: #6366f1; box-shadow: 0 12px 20px -5px rgba(99, 102, 241, 0.15); }
    </style>
</head>
<body class="bg-slate-50 transition-colors duration-500" id="bodyRoot">

<div class="flex h-screen w-full overflow-hidden">
    <!-- Sidebar -->
    <div class="w-20 md:w-80 bg-white border-r border-slate-200 flex flex-col z-40 transition-all duration-300">
        <div class="p-4 md:p-6 border-b flex flex-col items-center md:items-start">
            <h1 class="text-xl md:text-2xl font-black text-indigo-600 flex items-center gap-2">
                <i data-lucide="zap" class="fill-indigo-600 w-6 h-6"></i> 
                <span class="hidden md:inline">HumanCraft</span>
            </h1>
            <div class="hidden md:flex items-center gap-2 mt-4 bg-slate-100 p-3 rounded-2xl w-full border border-slate-200">
                <i data-lucide="database" class="w-4 h-4 text-amber-600"></i>
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-400 font-bold uppercase leading-none mb-1">Credits</span>
                    <span id="coinBalance" class="font-black text-slate-800 text-lg leading-none">0</span>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col p-2 md:p-4 gap-2 overflow-y-auto custom-scroll">
            <nav class="space-y-1">
                <button onclick="switchTab('inventory')" id="tabInv" class="w-full flex items-center gap-3 p-3 rounded-xl transition-all tab-active">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    <span class="hidden md:inline font-bold text-sm">Laboratory</span>
                </button>
                <button onclick="switchTab('library')" id="tabLib" class="w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-400 hover:bg-slate-50">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="hidden md:inline font-bold text-sm">Library</span>
                </button>
                <button onclick="switchTab('shop')" id="tabShop" class="w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-400 hover:bg-slate-50">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    <span class="hidden md:inline font-bold text-sm">Shop</span>
                </button>
            </nav>

            <div class="mt-8">
                <div id="inventoryContainer" class="space-y-2">
                    <h3 class="hidden md:block text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-3">Spawn Elements</h3>
                    <div id="inventoryList" class="grid grid-cols-1 gap-2"></div>
                </div>

                <div id="libraryContainer" class="hidden space-y-6">
                    <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                        <h3 class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-3">Texture Archive</h3>
                        <div id="textureGrid" class="grid grid-cols-2 gap-2"></div>
                    </div>
                    <div id="libraryList" class="space-y-2"></div>
                </div>

                <div id="shopContainer" class="hidden space-y-4 px-2">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Boosters</h3>
                    <div onclick="buyUpgrade('doubleCoins')" class="shop-card p-4 rounded-2xl cursor-pointer">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <i data-lucide="trending-up" class="w-5 h-5 text-indigo-500"></i>
                                <div><h4 class="font-bold text-xs">Double XP</h4><p class="text-[8px] text-slate-400">2x Coins</p></div>
                            </div>
                            <span class="bg-slate-900 text-white px-2 py-1 rounded text-[9px] font-black">2.5K</span>
                        </div>
                    </div>
                    <div onclick="buyUpgrade('autoMiner')" class="shop-card p-4 rounded-2xl cursor-pointer">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <i data-lucide="cpu" class="w-5 h-5 text-emerald-500"></i>
                                <div><h4 class="font-bold text-xs">Auto-Miner</h4><p class="text-[8px] text-slate-400">Passive Income</p></div>
                            </div>
                            <span class="bg-slate-900 text-white px-2 py-1 rounded text-[9px] font-black">5K</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-4 border-t bg-slate-50 mt-auto">
            <div class="flex gap-2">
                <button onclick="organizeBoard()" class="flex-1 p-2 bg-white border rounded-lg hover:bg-slate-50"><i data-lucide="layout-grid" class="w-4 h-4 mx-auto"></i></button>
                <button id="themeToggleBtn" onclick="toggleTheme()" class="flex-1 p-2 bg-white border rounded-lg hover:bg-slate-50"><i data-lucide="moon" class="w-4 h-4 mx-auto"></i></button>
            </div>
        </div>
    </div>

    <!-- Main Board -->
    <div id="board" class="flex-1 relative bg-slate-50 board-grid overflow-hidden">
        <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center opacity-10 pointer-events-none select-none">
            <i data-lucide="microscope" class="w-32 h-32 mb-6"></i>
            <h2 class="text-2xl font-black uppercase tracking-tighter">Laboratory</h2>
        </div>
    </div>

    <!-- Discovery Modal -->
    <div id="discoveryOverlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-500">
        <div class="bg-white rounded-[40px] p-10 text-center max-w-sm w-full mx-4" id="discoveryBox">
            <div id="discoveryEmoji" class="text-8xl mb-6"></div>
            <h2 id="discoveryName" class="text-3xl font-black mb-2 uppercase text-slate-800"></h2>
            <p class="text-slate-500 text-sm mb-8 px-4" id="discoveryFlavor"></p>
            <button onclick="closeDiscovery()" class="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black uppercase">Continue</button>
        </div>
    </div>
</div>

<script>
    const INITIAL_ELEMENTS = [
        { name: "Chester", emoji: "👳🏿‍♂️", rarity: "normal" },
        { name: "Melon", emoji: "🍉", rarity: "normal" },
        { name: "Coco", emoji: "🥥", rarity: "normal" },
        { name: "Anson", emoji: "👦", rarity: "67" },
    ];

    const RECIPES = {
        "Coco+Melon": { name: "Max", emoji: "🍔", rarity: "normal", flavor: "Standard delivery." },
        "Chester+Coco": { name: "Cornball", emoji: "🌽", rarity: "food", flavor: "This is what we call cornball " },
        "Cornball+Max": { name: "Cashoh", emoji: "👤", rarity: "gold", flavor: "Too Fat Chat" },
        "Chester+Chester": { name: "Leo", emoji: "👨🏿‍🦰", rarity: "void", flavor: "Chester Brother" },
        "Chester+Leo": { name: "Nigger Twins", emoji: "👨🏿‍❤️‍💋‍👨🏿", rarity: "brown", flavor: "Twins 💔" },
        "Max+Nigger Twins": { name: "Nigger Max", emoji: "👳🏿‍♂️🍔", rarity: "diamond", flavor: "Son i am crime 😭" },
        "Max+Max": { name: "Fat Max", emoji: "🍔🍔", rarity: "food", flavor: "Almost become cashoh lmao" },
        "Fat Max+Fat Max": { name: "Hamburger", emoji: "🍔🍔🍔", rarity: "dumb", flavor: "Beat cashoh" }
    };

    const ALL_RARITIES = ['normal', 'gold', 'diamond', 'void', 'brown', 'verified', 'food', '67', 'dumb'];

    let state = {
        inventory: JSON.parse(localStorage.getItem('hc_inv_v6')) || [...INITIAL_ELEMENTS],
        coins: parseInt(localStorage.getItem('hc_coins_v6')) || 0,
        upgrades: JSON.parse(localStorage.getItem('hc_up_v6')) || { doubleCoins: false, autoMiner: false },
        theme: localStorage.getItem('hc_theme_v6') || 'light'
    };

    let boardItems = [];
    let draggedId = null;
    let dragOffset = { x: 0, y: 0 };

    function init() {
        lucide.createIcons();
        applyTheme(state.theme);
        renderInventory();
        updateUI();
        
        const b = document.getElementById('board');
        b.addEventListener('mousemove', handleMove);
        b.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        setInterval(() => {
            if (state.upgrades.autoMiner) {
                state.coins += 5;
                updateUI();
            }
        }, 1000);
    }

    function getCustomHTML(item) {
        let content = `<span class="text-3xl z-10">${item.emoji}</span>`;
        if (item.rarity === 'brown') {
            content = `
                <img src="https://tr.rbxcdn.com/180DAY-3f0db344667978c1ca9a51d235edc38f/420/420/Hat/Webp/noFilter" class="brown-asset brown-asset-left">
                <span class="text-3xl z-10">${item.emoji}</span>
                <img src="https://tr.rbxcdn.com/180DAY-374b4d5ff4d61b28e7e60f1983d3ca3d/420/420/BackAccessory/Webp/noFilter" class="brown-asset brown-asset-right">
            `;
        } else if (item.rarity === 'verified') {
            const badge = 'https://static.vecteezy.com/system/resources/thumbnails/047/309/918/small_2x/verified-badge-profile-icon-png.png';
            content = `
                <div class="verified-container">
                    <div class="verified-row">${Array(10).fill(`<img src="${badge}" class="verified-icon-small">`).join('')}</div>
                    <div class="verified-row">${Array(10).fill(`<img src="${badge}" class="verified-icon-small">`).join('')}</div>
                    <div class="verified-row">${Array(10).fill(`<img src="${badge}" class="verified-icon-small">`).join('')}</div>
                </div>
                <span class="text-3xl z-10">${item.emoji}</span>
            `;
        } else if (item.rarity === 'food') {
            content = `
                <div class="food-pattern">${Array(12).fill('🍕🍔🍟').join('')}</div>
                <span class="text-3xl z-10">${item.emoji}</span>
            `;
        } else if (item.rarity === '67') {
            content = `
                <div class="bg-67"></div>
                <span class="text-3xl z-10">${item.emoji}</span>
            `;
        } else if (item.rarity === 'dumb') {
            content = `
                <div class="bg-dumb"></div>
                <span class="text-3xl z-10">${item.emoji}</span>
            `;
        }
        return content;
    }

    function createEl(item) {
        const div = document.createElement('div');
        div.id = `item-${item.id}`;
        div.className = `absolute px-6 py-4 border-2 rounded-[24px] cursor-grab flex items-center justify-center gap-3 item-card rarity-container rarity-${item.rarity}`;
        div.style.transform = `translate3d(${item.x}px, ${item.y}px, 0)`;
        
        div.innerHTML = `
            ${getCustomHTML(item)}
            <div class="flex flex-col z-10">
                <span class="font-black text-[10px] uppercase">${item.name}</span>
                <span class="text-[8px] font-bold opacity-40 uppercase">${item.rarity}</span>
            </div>
        `;
        div.onmousedown = (e) => startDrag(item.id, e);
        div.ontouchstart = (e) => startDrag(item.id, e);
        return div;
    }

    function startDrag(id, e) {
        draggedId = id;
        const it = boardItems.find(i => i.id === id);
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        dragOffset = { x: cx - it.x, y: cy - it.y };
        document.getElementById(`item-${id}`).style.zIndex = "100";
    }

    function handleMove(e) {
        if (!draggedId) return;
        if (e.cancelable) e.preventDefault();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const it = boardItems.find(i => i.id === draggedId);
        it.x = cx - dragOffset.x;
        it.y = cy - dragOffset.y;
        document.getElementById(`item-${draggedId}`).style.transform = `translate3d(${it.x}px, ${it.y}px, 0)`;
    }

    function handleEnd() {
        if (!draggedId) return;
        const it = boardItems.find(i => i.id === draggedId);
        const target = boardItems.find(o => o.id !== draggedId && Math.hypot(it.x-o.x, it.y-o.y) < 80);
        if (target) {
            const key = [it.name, target.name].sort().join('+');
            const res = RECIPES[key];
            if (res) {
                boardItems = boardItems.filter(i => i.id !== draggedId && i.id !== target.id);
                document.getElementById(`item-${draggedId}`).remove();
                document.getElementById(`item-${target.id}`).remove();
                const newItem = { ...res, id: Date.now(), x: target.x, y: target.y };
                boardItems.push(newItem);
                document.getElementById('board').appendChild(createEl(newItem));
                state.coins += state.upgrades.doubleCoins ? 200 : 100;
                if (!state.inventory.find(i => i.name === res.name)) {
                    state.inventory.push(res);
                    showDiscovery(res);
                }
                updateUI();
            }
        }
        draggedId = null;
    }

    function renderInventory() {
        const list = document.getElementById('inventoryList');
        list.innerHTML = '';
        state.inventory.forEach(item => {
            const btn = document.createElement('button');
            // Fixed: Added rarity-container and getCustomHTML to inventory buttons
            btn.className = `w-full flex items-center gap-4 p-4 border-2 rounded-2xl text-left rarity-container rarity-${item.rarity}`;
            btn.innerHTML = `
                ${getCustomHTML(item)}
                <div class="flex flex-col z-10">
                    <span class="font-black text-[11px] uppercase">${item.name}</span>
                    <span class="text-[8px] font-bold opacity-40 uppercase">${item.rarity}</span>
                </div>
            `;
            btn.onclick = () => spawnItem(item);
            list.appendChild(btn);
        });
        updateLibrary();
    }

    function updateLibrary() {
        const grid = document.getElementById('textureGrid');
        const list = document.getElementById('libraryList');
        grid.innerHTML = '';
        list.innerHTML = '<h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 mt-6">Specimen Codex</h3>';
        
        ALL_RARITIES.forEach(rarity => {
            const div = document.createElement('div');
            div.className = `h-10 rounded-xl rarity-container rarity-${rarity} flex items-center justify-center text-[9px] font-black uppercase border-2`;
            div.innerHTML = `<span class="z-10">${rarity}</span>`;
            grid.appendChild(div);
        });

        Object.entries(RECIPES).forEach(([key, res]) => {
            const unlocked = state.inventory.some(i => i.name === res.name);
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl border-2 flex items-center justify-between ${unlocked ? 'bg-white border-slate-100' : 'bg-slate-50 border-dashed opacity-40'}`;
            div.innerHTML = `<div class="flex items-center gap-3"><span class="text-2xl">${unlocked ? res.emoji : '❓'}</span><div><span class="text-[10px] font-black uppercase">${unlocked ? res.name : 'Unknown'}</span><p class="text-[8px] font-bold text-slate-400">${key}</p></div></div>`;
            list.appendChild(div);
        });
    }

    function spawnItem(item) {
        const x = 50 + Math.random() * (window.innerWidth - 350);
        const y = 50 + Math.random() * (window.innerHeight - 150);
        const newItem = { ...item, id: Date.now(), x, y };
        boardItems.push(newItem);
        document.getElementById('board').appendChild(createEl(newItem));
        document.getElementById('emptyState').classList.add('hidden');
    }

    function buyUpgrade(id) {
        const cost = id === 'doubleCoins' ? 2500 : 5000;
        if (state.coins >= cost && !state.upgrades[id]) {
            state.coins -= cost;
            state.upgrades[id] = true;
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('coinBalance').innerText = state.coins.toLocaleString();
        save();
    }

    function switchTab(t) {
        document.getElementById('inventoryContainer').classList.toggle('hidden', t !== 'inventory');
        document.getElementById('libraryContainer').classList.toggle('hidden', t !== 'library');
        document.getElementById('shopContainer').classList.toggle('hidden', t !== 'shop');
        document.getElementById('tabInv').classList.toggle('tab-active', t === 'inventory');
        document.getElementById('tabLib').classList.toggle('tab-active', t === 'library');
        document.getElementById('tabShop').classList.toggle('tab-active', t === 'shop');
    }

    function showDiscovery(item) {
        const overlay = document.getElementById('discoveryOverlay');
        document.getElementById('discoveryEmoji').innerText = item.emoji;
        document.getElementById('discoveryName').innerText = item.name;
        document.getElementById('discoveryFlavor').innerText = item.flavor;
        overlay.classList.remove('hidden');
        setTimeout(() => overlay.classList.add('active'), 50);
    }

    function closeDiscovery() {
        document.getElementById('discoveryOverlay').classList.remove('active');
        setTimeout(() => { document.getElementById('discoveryOverlay').classList.add('hidden'); renderInventory(); }, 500);
    }

    function organizeBoard() {
        boardItems.forEach((it, idx) => {
            const rect = document.getElementById('board').getBoundingClientRect();
            const cols = Math.floor((rect.width - 100) / 180);
            it.x = 40 + (idx % cols) * 180; it.y = 60 + Math.floor(idx / cols) * 80;
            const el = document.getElementById(`item-${it.id}`);
            if (el) el.style.transform = `translate3d(${it.x}px, ${it.y}px, 0)`;
        });
    }

    function applyTheme(t) { document.getElementById('bodyRoot').className = t === 'dark' ? 'theme-dark bg-slate-900' : 'bg-slate-50'; }
    function toggleTheme() { state.theme = state.theme === 'light' ? 'dark' : 'light'; applyTheme(state.theme); save(); }

    function save() {
        localStorage.setItem('hc_inv_v6', JSON.stringify(state.inventory));
        localStorage.setItem('hc_coins_v6', state.coins);
        localStorage.setItem('hc_up_v6', JSON.stringify(state.upgrades));
        localStorage.setItem('hc_theme_v6', state.theme);
    }

    window.onload = init;
</script>
</body>
</html>
